envsync:
    jobs:
        - name: envsync
          run: go run ./ci/envsync/cmd fix

        - name: gofmt
          glob: "**/*.go"
          run: gofmt -w {staged_files}
          stage_fixed: true

pre-commit:
    jobs:
        - name: envsync
          run: go run ./ci/envsync/cmd fix
          stage_fixed: true

        - name: gofmt
          glob: "**/*.go"
          run: gofmt -w {staged_files}
          stage_fixed: true

        - name: go mod tidy
          run: go mod tidy
          stage_fixed: true
